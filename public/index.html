<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gmail Alias Inbox</title>

  <style>
    :root {
      --bg: #0b63f6;
      --bg-dark: #0748b8;
      --card: #ffffff;
      --muted: #64748b;
      --text: #0f172a;
      --line: #dbeafe;
      --danger: #dc2626;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.22);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.24), transparent 32rem),
        linear-gradient(135deg, var(--bg), var(--bg-dark));
    }

    .page {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    .title {
      color: white;
      margin-bottom: 20px;
    }

    .title h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 5vw, 48px);
      letter-spacing: -0.04em;
    }

    .title p {
      margin: 0;
      opacity: 0.9;
      font-size: 16px;
    }

    .address-card {
      background: rgba(255, 255, 255, 0.96);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 14px;
      align-items: center;
      margin-bottom: 22px;
    }

    .email-box {
      border: 2px solid var(--line);
      background: #eff6ff;
      border-radius: 18px;
      min-height: 58px;
      padding: 16px 18px;
      font-family: Consolas, Monaco, monospace;
      font-size: clamp(15px, 3vw, 22px);
      overflow-wrap: anywhere;
      display: flex;
      align-items: center;
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 16px 18px;
      font-weight: 800;
      cursor: pointer;
      background: #0f172a;
      color: white;
      min-height: 58px;
    }

    button.secondary {
      background: #e2e8f0;
      color: #0f172a;
    }

    button:hover {
      filter: brightness(1.08);
    }

    .inbox-card {
      background: rgba(255, 255, 255, 0.97);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-height: 560px;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .inbox-header {
      padding: 18px 22px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .inbox-header h2 {
      margin: 0;
      font-size: 20px;
    }

    .status {
      color: var(--muted);
      font-size: 14px;
    }

    .mail-list {
      overflow: auto;
      max-height: 620px;
    }

    .empty {
      height: 360px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 32px;
    }

    .mail-item {
      padding: 18px 22px;
      border-bottom: 1px solid #e2e8f0;
      cursor: pointer;
      display: grid;
      gap: 8px;
      background: white;
    }

    .mail-item:hover {
      background: #f8fafc;
    }

    .mail-top {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: baseline;
    }

    .mail-subject {
      font-weight: 800;
      font-size: 16px;
    }

    .mail-date {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .mail-from {
      color: #334155;
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    .mail-snippet {
      color: var(--muted);
      line-height: 1.45;
    }

    .error {
      color: var(--danger);
      font-weight: 700;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.64);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 10;
    }

    .modal.open {
      display: flex;
    }

    .modal-panel {
      width: min(980px, 100%);
      height: min(820px, calc(100vh - 48px));
      background: white;
      border-radius: 24px;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
      box-shadow: var(--shadow);
    }

    .modal-head {
      padding: 18px 20px;
      border-bottom: 1px solid #e2e8f0;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
    }

    .modal-head h3 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
      display: grid;
      gap: 4px;
      overflow-wrap: anywhere;
    }

    .close-btn {
      min-height: 44px;
      padding: 10px 14px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: white;
    }

    @media (max-width: 760px) {
      .address-card {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }

      .mail-top {
        display: grid;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="title">
      <h1>Gmail Alias Inbox</h1>
      <p>Tạo địa chỉ Gmail alias random và đọc email gửi tới alias đó.</p>
    </section>

    <section class="address-card">
      <div id="emailBox" class="email-box">Đang tạo alias...</div>
      <button id="newBtn">Tạo mới</button>
      <button id="copyBtn" class="secondary">Copy</button>
    </section>

    <section class="inbox-card">
      <div class="inbox-header">
        <div>
          <h2>Inbox</h2>
          <div id="status" class="status">Đang khởi tạo...</div>
        </div>
        <button id="refreshBtn" class="secondary">Refresh</button>
      </div>

      <div id="mailList" class="mail-list">
        <div class="empty">Chưa có dữ liệu.</div>
      </div>
    </section>
  </main>

  <div id="modal" class="modal">
    <div class="modal-panel">
      <div class="modal-head">
        <div>
          <h3 id="modalSubject">(không có subject)</h3>
          <div class="meta">
            <div><b>From:</b> <span id="modalFrom"></span></div>
            <div><b>To:</b> <span id="modalTo"></span></div>
            <div><b>Date:</b> <span id="modalDate"></span></div>
          </div>
        </div>
        <button id="closeBtn" class="close-btn">Đóng</button>
      </div>

      <iframe
        id="mailFrame"
        sandbox
        referrerpolicy="no-referrer"
        title="Email content"
      ></iframe>
    </div>
  </div>

  <script>
    const state = {
      alias: localStorage.getItem("currentAlias") || ""
    };

    const emailBox = document.getElementById("emailBox");
    const newBtn = document.getElementById("newBtn");
    const copyBtn = document.getElementById("copyBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const statusEl = document.getElementById("status");
    const mailList = document.getElementById("mailList");

    const modal = document.getElementById("modal");
    const closeBtn = document.getElementById("closeBtn");
    const modalSubject = document.getElementById("modalSubject");
    const modalFrom = document.getElementById("modalFrom");
    const modalTo = document.getElementById("modalTo");
    const modalDate = document.getElementById("modalDate");
    const mailFrame = document.getElementById("mailFrame");

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.className = isError ? "status error" : "status";
    }

    function setAlias(alias) {
      state.alias = alias;
      localStorage.setItem("currentAlias", alias);
      emailBox.textContent = alias;
    }

    async function api(path, options = {}) {
      const response = await fetch(path, options);
      const data = await response.json().catch(() => ({}));

      if (!response.ok) {
        throw new Error(data.error || `HTTP ${response.status}`);
      }

      return data;
    }

    async function createAlias() {
      setStatus("Đang tạo alias mới...");

      const data = await api("/api/alias", {
        method: "POST"
      });

      setAlias(data.email);
      await loadMessages();
    }

    function formatDate(message) {
      if (message.internalDate) {
        return new Date(message.internalDate).toLocaleString("vi-VN");
      }

      if (message.date) {
        const parsed = new Date(message.date);

        if (!Number.isNaN(parsed.getTime())) {
          return parsed.toLocaleString("vi-VN");
        }
      }

      return "";
    }

    function renderMessages(messages) {
      mailList.innerHTML = "";

      if (!messages.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.innerHTML = `
          <div>
            <b>Chưa có email.</b><br>
            Gửi thử một email tới alias phía trên rồi bấm Refresh.
          </div>
        `;
        mailList.appendChild(empty);
        return;
      }

      for (const message of messages) {
        const item = document.createElement("article");
        item.className = "mail-item";

        const top = document.createElement("div");
        top.className = "mail-top";

        const subject = document.createElement("div");
        subject.className = "mail-subject";
        subject.textContent = message.subject || "(không có subject)";

        const date = document.createElement("div");
        date.className = "mail-date";
        date.textContent = formatDate(message);

        const from = document.createElement("div");
        from.className = "mail-from";
        from.textContent = message.from || "(không rõ người gửi)";

        const snippet = document.createElement("div");
        snippet.className = "mail-snippet";
        snippet.textContent = message.snippet || "";

        top.appendChild(subject);
        top.appendChild(date);

        item.appendChild(top);
        item.appendChild(from);
        item.appendChild(snippet);

        item.addEventListener("click", () => openMessage(message.id));

        mailList.appendChild(item);
      }
    }

    async function loadMessages() {
      if (!state.alias) {
        await createAlias();
        return;
      }

      setStatus("Đang tải inbox...");

      const data = await api(
        `/api/messages?alias=${encodeURIComponent(state.alias)}`
      );

      renderMessages(data.messages || []);
      setStatus(`Đang xem ${data.count || 0} email cho alias hiện tại.`);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function openMessage(id) {
      setStatus("Đang mở email...");

      const message = await api(
        `/api/messages/${encodeURIComponent(id)}?alias=${encodeURIComponent(state.alias)}`
      );

      modalSubject.textContent = message.subject || "(không có subject)";
      modalFrom.textContent = message.from || "";
      modalTo.textContent = message.to || "";
      modalDate.textContent = message.date || "";

      const fallbackText = `
        <pre style="white-space:pre-wrap;font-family:Arial,Helvetica,sans-serif;line-height:1.55;">
${escapeHtml(message.text || message.snippet || "")}
        </pre>
      `;

      const body = message.html || fallbackText;

      mailFrame.srcdoc = `
        <!doctype html>
        <html>
          <head>
            <meta charset="utf-8">
            <base target="_blank">
            <style>
              body {
                margin: 24px;
                font-family: Arial, Helvetica, sans-serif;
                line-height: 1.55;
                color: #0f172a;
              }

              img {
                max-width: 100%;
                height: auto;
              }

              table {
                max-width: 100%;
              }

              a {
                color: #0b63f6;
              }
            </style>
          </head>
          <body>
            ${body}
          </body>
        </html>
      `;

      modal.classList.add("open");
      setStatus("Email đã mở.");
    }

    async function copyAlias() {
      if (!state.alias) return;

      await navigator.clipboard.writeText(state.alias);
      setStatus("Đã copy alias vào clipboard.");
    }

    function closeModal() {
      modal.classList.remove("open");
      mailFrame.srcdoc = "";
    }

    newBtn.addEventListener("click", () => {
      createAlias().catch((error) => setStatus(error.message, true));
    });

    copyBtn.addEventListener("click", () => {
      copyAlias().catch((error) => setStatus(error.message, true));
    });

    refreshBtn.addEventListener("click", () => {
      loadMessages().catch((error) => setStatus(error.message, true));
    });

    closeBtn.addEventListener("click", closeModal);

    modal.addEventListener("click", (event) => {
      if (event.target === modal) {
        closeModal();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeModal();
      }
    });

    loadMessages().catch((error) => setStatus(error.message, true));

    setInterval(() => {
      loadMessages().catch((error) => setStatus(error.message, true));
    }, 10000);
  </script>
</body>
  </html>
